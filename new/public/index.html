<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recherche blockchain</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <button class="notif-toggle" id="notifBtn">
            🔔 Notifications
            <span class="badge" id="notifBadge">0</span>
        </button>
    </header>

    <main>
        <form class="search" id="searchForm" autocomplete="off">
            <input id="searchInput" placeholder="Collez une adresse (wallet) ou un hash de transaction…" spellcheck="false" />
            <button type="submit">Rechercher</button>
        </form>
        <div id="results"></div>
    </main>

    <!-- Panneau état des chaînes -->
    <aside id="chains">
        <div class="ph">
            État des réseaux
            <span class="live">en direct</span>
        </div>
        <div id="chainBody"></div>
    </aside>

    <!-- Tiroir notifications -->
    <div id="overlay"></div>
    <aside id="drawer">
        <div class="dh">
            <h3>🔔 Transactions suivies</h3>
            <button id="drawerClose">&times;</button>
        </div>
        <div id="notif-list">
            <div id="notif-empty">Aucune transaction suivie.<br />Recherchez une transaction non finalisée puis cliquez sur « Notifier ».</div>
        </div>
    </aside>

    <script type="module" src="js/app.js"></script>
</body>
</html>
